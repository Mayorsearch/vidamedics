<!-- Static skeleton for Netlify Forms build-time detection -->
<html>
  <body>
    <form name="admin-notifications" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="admin-notifications" />
      <input name="notification_type" />
      <input name="title" />
      <textarea name="message"></textarea>
      <input name="email" />
      <input name="subject" />
      <input name="sender" />
      <input name="bot-field" />
    </form>
  </body>
</html>
